# Conventional Commits 1.0.0 enforcement (https://www.conventionalcommits.org/en/v1.0.0/).
# Used by the commitlint pre-commit hook (commit-msg stage). The commit-msg-autofix
# hook runs first and injects/normalizes the (mandatory) scope, so these rules mostly
# validate what autofix could not repair.
extends: ["@commitlint/config-conventional"]
rules:
  type-enum:
    - 2
    - always
    - [feat, fix, build, chore, ci, docs, style, refactor, perf, test, revert]
  scope-empty: [2, never]
