name: 🚀 Developer Feature Request
description: Propose a new feature with task breakdowns, file impacts, and dependencies.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛑 Stop: Is this an Epic?
        **Does this feature require code changes across MULTIPLE repositories?** (e.g., you need to update both the `frontend` and the `gateway` to ship this).
        
        * **If YES:** You are creating an Epic. Please click the **Labels** gear icon on the right sidebar and add the `epic` label before submitting. Also link the related inter-repository issues as sub-issues.
        * **If NO or you do not know:** Do not add the Epic label. Proceed normally.

  - type: textarea
    id: problem
    attributes:
      label: 📖 The Problem
      description: What problem does this feature solve from a system or user perspective?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 The Solution
      description: What is the proposed solution and how does it work?
    validations:
      required: true

  - type: dropdown
    id: feature-flag
    attributes:
      label: 🚩 Rollout Strategy / Feature Flag
      description: Does this feature require a feature flag for a safe, gradual rollout?
      options:
        - "Yes - Requires a new feature flag"
        - "Yes - Behind an existing feature flag"
        - "No - Safe to release immediately"
        - "Not Applicable"
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: 🛠️ Implementation Plan & Sub-tasks
      description: If this is an Epic, outline the cross-repo issues here. If it is a standard feature, list the file changes.
      value: |
        ### Required Tasks
        - [ ] Task 1...
        - [ ] Task 2...
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: 🧪 Testing Requirements (Mandatory)
      description: All features must include comprehensive tests. List the test files affected.
      value: |
        - [ ] **Unit Tests:** `tests/unit/...`
        - [ ] **Integration Tests:** `tests/integration/...`
    validations:
      required: true

  - type: checkboxes
    id: dod
    attributes:
      label: ✅ Definition of Done (DoD)
      options:
        - label: Code is implemented across all specified files.
          required: true
        - label: Comprehensive test suite (Unit & Integration) passes with >= 80% coverage.
          required: true
        - label: Documentation updated (Readme/API specs if applicable).
          required: false