name: 🐛 Bug Report
description: Report a bug, crash, or unexpected behavior in the system.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: 📝 Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: 🔄 Steps to Reproduce
      description: Exactly how can we reproduce this issue?
      value: |
        1. Go to '...'
        2. Prepare Data '....'
        3. Send API payload '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: ✨ Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 🌐 Environment & Microservices Involved
      description: Which microservices, OS, or browsers are affected?
      value: |
        - **Microservice(s):** [e.g., gateway, reducer]
        - **Environment:** [e.g., Docker, Native]
        - **Browser/OS:** [e.g., Chrome 114, Ubuntu 22.04]
    validations:
      required: true

  - type: textarea
    id: testing-fix
    attributes:
      label: 🧪 Testing Requirements for Fix (Mandatory)
      description: How will this bug fix be tested to prevent regressions?
      value: |
        - [ ] **Regression Test:** Add test case to cover this specific failure.
        - **File to modify:** `tests/integration/...`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📜 Logs, Errors, or Screenshots
      description: Paste any relevant logs, stack traces, or screenshots here.
      render: shell
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### 🛑 Stop: Is this an Epic?
        **Does fixing this bug require coordinated pull requests across MULTIPLE repositories?** (e.g., a data flow bug that requires fixes in both the gateway repo and the edge-worker repo).

        * **If YES:** You are creating an Epic. Please click the **Labels** button below or the gear icon on the right sidebar and add the `epic` label before submitting. Also link the related inter-repository issues as sub-issues.
        * **If NO or you do not know:** Do not add the Epic label. Proceed normally.
