name: Auto-assign Issues & PRs to Org Project

on:
  issues:
    types: [opened, labeled]
  pull_request:
    # Triggers when a PR is opened, ready for review (draft to normal), or labeled
    types: [opened, ready_for_review, labeled]

jobs:
  add-to-project:
    name: Add item to project
    runs-on: ubuntu-latest
    steps:
      - name: Add to GitHub Project
        uses: actions/add-to-project@v0.5.0
        with:
          # Replace with your Organization Project URL
          project-url: https://github.com/orgs/SecQDevOps/projects/3

          # A Personal Access Token (PAT) with 'project' scope is required
          github-token: ${{ secrets.PROJECT_AUTO_ADD_TOKEN }}

          # OPTIONAL: Only add issues/PRs with these labels.
          # If you want ALL PRs to be added automatically regardless of labels,
          # delete the "labeled:" line entirely.
          labeled: feature, bug, enhancement