name: Auto Assign Reviewer and Label
on:
  pull_request:
    types: [opened, ready_for_review]
  # Allow member repositories to invoke this as a reusable workflow. The
  # pull_request trigger above only fires for this (.github) repo's own PRs;
  # other repos call the workflow_call entrypoint below via a thin caller.
  workflow_call:

# Explicitly grant necessary permissions
permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7 # Updated to v7
        env:
          TARGET_REVIEWER: 'JoeKae' # Pass the variable to the environment
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;
            const targetReviewer = process.env.TARGET_REVIEWER;
            const creator = context.payload?.pull_request?.user?.login;

            if (!creator) {
                console.log('Could not determine the PR creator. Exiting.');
                return;
            }

            // 1. add label
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: ['waiting for review']
            });

            // 2. assign reviewer (only if the creator is not the target reviewer)
            if (creator !== targetReviewer) {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: [targetReviewer]
              });
            }
