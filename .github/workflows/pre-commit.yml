name: pre-commit

# Reusable org-wide workflow: runs the repo's pre-commit hooks (pre-commit stage:
# hygiene, secrets, formatting) across all files. Complements — does not replace —
# each repo's language lint/type/test jobs. Call it from a repo's ci.yml with:
#   pre-commit:
#     uses: SecQDevOps/.github/.github/workflows/pre-commit.yml@main
on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Python is always needed to run pre-commit itself (ruff ships isolated).
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # Toolchains for the local format hooks, installed only when relevant.
      - if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - if: ${{ hashFiles('go.mod') != '' }}
        run: |
          go install mvdan.cc/gofumpt@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - if: ${{ hashFiles('Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      # Cache the hook environments (pre-commit/action did this for us); we run
      # pre-commit directly so we can render a readable summary of hook results.
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit (+ job summary)
        run: |
          set +e
          python -m pip install --quiet pre-commit
          pre-commit run --all-files --show-diff-on-failure 2>&1 | tee out.txt
          CODE=${PIPESTATUS[0]}
          {
            echo "## 🪝 pre-commit — hygiene, secrets, formatting"
            if [ "$CODE" -eq 0 ]; then
              echo "✅ All hooks passed."
            else
              echo "❌ One or more hooks failed (some may have auto-fixed files locally)."
              echo ""
              echo "| Hook | Result |"
              echo "|:--|:--|"
              sed -E 's/\x1b\[[0-9;]*m//g' out.txt \
                | grep -E '\.\.\.*(Passed|Failed|Skipped)$' \
                | sed -E 's/^(.*[^.])\.+(Passed|Failed|Skipped)$/| \1 | \2 |/' | head -50
              echo ""
              echo "<details><summary>Full output</summary>"; echo ""; echo '```'
              sed -E 's/\x1b\[[0-9;]*m//g' out.txt | tail -c 30000
              echo '```'; echo ""; echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$CODE"
