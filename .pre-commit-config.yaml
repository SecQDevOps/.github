# Pre-commit hooks for the SecQDevOps .github (org profile / templates) repo.
# Docs/config repo: cross-cutting hygiene + secrets + commit-msg + shellcheck.
# The commit message is auto-fixed, then validated.
# Install once:  pip install pre-commit && pre-commit install --install-hooks
default_stages: [pre-commit]
default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0 # pin latest at install
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-case-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2 # pin latest
    hooks:
      - id: gitleaks

  # commit-msg: auto-fix first (mandatory scope + strip attribution), then validate.
  - repo: local
    hooks:
      - id: commit-msg-autofix
        name: normalize commit message (scope + strip attribution)
        language: system
        stages: [commit-msg]
        entry: python3 .hooks/commit-msg-autofix.py --scope org

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.20.0 # pin latest
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1 # pin latest
    hooks:
      - id: shellcheck
